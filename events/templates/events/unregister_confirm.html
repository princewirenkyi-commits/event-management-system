{% extends 'base.html' %}
{% block content %}
<div class='confirm-box'>
  <h1>Remove Attendee</h1>
  <p>Remove <strong>{{ attendee.get_full_name }}</strong> from <strong>{{ event.title }}</strong>?</p>
  <form method='POST'>
    {% csrf_token %}
    <button type='submit' class='btn btn-danger'>Yes, Remove</button>
    <a href="{% url 'event_detail' event.slug %}" class='btn btn-secondary'>Cancel</a>
  </form>
</div>
{% endblock %}
