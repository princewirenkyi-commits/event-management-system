<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>{% block title %}Event Platform{% endblock %}</title>
  {% load static %}
  <link rel='stylesheet' href="{% static 'css/style.css' %}">
</head>
<body>
  <nav class='navbar'>
    <a class='brand' href="{% url 'home' %}">EventPlatform</a>
    <div class='nav-links'>
      <a href="{% url 'home' %}">Home</a>
      <a href="{% url 'event_list' %}">Events</a>
      <a href="{% url 'attendee_list' %}">Attendees</a>
      <a href="{% url 'event_create' %}" class='btn btn-primary'>+ Create Event</a>
    </div>
  </nav>
  <div class='container'>
    {% if messages %}
      {% for message in messages %}
        <div class='alert alert-{{ message.tags }}'>{{ message }}</div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </div>
  <footer><p>Event Management Platform &copy; 2025</p></footer>
</body>
</html>
