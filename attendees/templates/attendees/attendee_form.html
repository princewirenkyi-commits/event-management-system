{% extends 'base.html' %}
{% block title %}{{ action }} Attendee{% endblock %}
{% block content %}
<h1>{{ action }} Attendee</h1>
<form method='POST' class='form-styled'>
  {% csrf_token %}
  {% for field in form %}
    <div class='form-group'>
      <label for='{{ field.id_for_label }}'>{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}<p class='error'>{{ field.errors }}</p>{% endif %}
    </div>
  {% endfor %}
  <div class='form-actions'>
    <button type='submit' class='btn btn-primary'>{{ action }} Attendee</button>
    <a href="{% url 'attendee_list' %}" class='btn btn-secondary'>Cancel</a>
  </div>
</form>
{% endblock %}
